; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Build targets
; -------------
;   target1 - Original PCB hardware based on ESP32 Dev Kit
;   target2 - Placeholder target for future ESP32-C3 based hardware
;
; To select a target in VS Code / PlatformIO IDE:
;   Use the environment selector in the bottom status bar.
;
; To select a target with the PlatformIO CLI:
;   pio run -e target1
;   pio run -e target2

; ---------------------------------------------------------------------------
; Shared settings inherited by all environments
; ---------------------------------------------------------------------------
[common]
framework = arduino
monitor_speed = 115200
lib_deps =
	esp32async/ESPAsyncWebServer@^3.9.4
	madhephaestus/ESP32Servo@^3.1.1
	arminjo/ServoEasing@^3.5.0
	bblanchon/ArduinoJson@^7.4.2
	esp32async/AsyncTCP@^3.4.10
	pubsubclient3@^3.3.0
	EspSoftwareSerial@^8.1.0

; ---------------------------------------------------------------------------
; Target 1 — Original hardware based on ESP32 Dev Kit
; ---------------------------------------------------------------------------
[env:target1]
platform = espressif32
board = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags = -DHW_ESP32DEV

; ---------------------------------------------------------------------------
; Target 2 — Placeholder for future ESP32-C3 based hardware
; ---------------------------------------------------------------------------
[env:target2]
platform = espressif32
board = esp32-c3-devkitm-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags = -DHW_ESP32C3
